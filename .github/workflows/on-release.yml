name: On Release Workflow

on:
  release:
    types: [ published ]

jobs:
  vuln-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: './go.mod'
          check-latest: true

  build:
    needs: vuln-check
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Helm chart version
        run: |
          TAG=${{ github.event.release.tag_name }}
          VERSION=${TAG#v}
          sed -i "s/^version:.*$/version: $VERSION/" contrib/charts/gubernator/Chart.yaml
          sed -i "s/^appVersion:.*$/appVersion: $VERSION/" contrib/charts/gubernator/Chart.yaml

      # Buildx Needs QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # We use Buildx so we can take advantage of the caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          tags: |
            ghcr.io/gubernator-io/gubernator:${{ github.event.release.tag_name }}
            ghcr.io/gubernator-io/gubernator:latest
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.4

      - name: Push Helm chart to GHCR (OCI)
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          helm package contrib/charts/gubernator --destination ./ --version "${VERSION}"
          helm push "gubernator-${VERSION}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"
